<!DOCTYPE html>
<html>
<head>
    <title>Startup Success Predictor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card-box {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            background-color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card-box">

    <h2>Enter Startup Parameters</h2>

    <form action="/predict" method="post">

        <div class="mb-3">
            <label class="form-label">Age at First Funding Year</label>
            <input type="number" name="age_first_funding_year" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Age at Last Funding Year</label>
            <input type="number" name="age_last_funding_year" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Age at First Milestone Year</label>
            <input type="number" name="age_first_milestone_year" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Age at Last Milestone Year</label>
            <input type="number" name="age_last_milestone_year" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Number of Relationships</label>
            <input type="number" name="relationships" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Number of Funding Rounds</label>
            <input type="number" name="funding_rounds" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Total Funding (in USD)</label>
            <input type="number" name="funding_total_usd" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Number of Milestones</label>
            <input type="number" name="milestones" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Average Participants</label>
            <input type="number" name="avg_participants" class="form-control">
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-success">Predict</button>
        </div>

    </form>

</div>

</body>
</html>
