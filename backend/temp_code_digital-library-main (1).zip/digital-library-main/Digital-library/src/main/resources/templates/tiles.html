  <script>
    // --- helpers ---
    const EMAIL_KEYS = ["user_email", "email"]; // keep both for compatibility

    function getStoredEmail() {
      for (const k of EMAIL_KEYS) {
        const v = (localStorage.getItem(k) || "").trim();
        if (v) return v;
      }
      return "";
    }

    function setStoredEmail(email) {
      const clean = (email || "").trim();
      if (!clean) return;
      for (const k of EMAIL_KEYS) {
        localStorage.setItem(k, clean);
      }
    }

    function renderWelcome() {
      const span = document.getElementById("welcomeEmail");
      if (!span) return;

      // 1) prefer email from storage
      let email = getStoredEmail();

      // 2) otherwise, try to read server-rendered text in the span
      if (!email) {
        const fromSpan = (span.textContent || "").trim();
        if (fromSpan && fromSpan.toLowerCase() !== "user" && fromSpan.toLowerCase() !== "guest") {
          email = fromSpan;
          setStoredEmail(email); // stash for other pages (e.g., "My Uploads")
        }
      }

      // 3) update UI
      span.textContent = email || "Guest";
    }

    // --- navigation ---
    function goto(page) {
      if (page) window.location.href = page;
    }

    // --- logout ---
    function logout() {
      try {
        sessionStorage.clear();
        localStorage.clear();
      } finally {
        window.location.href = "/";
      }
    }

    // --- boot ---
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", renderWelcome);
    } else {
      renderWelcome();
    }
  </script>
